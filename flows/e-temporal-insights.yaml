appId: com.tummytracker.app
# E — Temporal insights (partial / best-effort):
#   Assert the Insights summary counts render correctly after seeding food entries.
#   "Timing patterns" requires a 24h windowed join between food and adverse outcome;
#   that gap cannot be constructed deterministically in a clearState run without
#   driving the native date/time picker for every entry — left as manual per spec.
---
- launchApp:
    clearState: true
# Seed food + BM entries to populate the summary line
- runFlow: _helpers/seed-two-meals.yaml
- tapOn:
    text: "Log a bowel movement"
- waitForAnimationToEnd
- tapOn:
    text: "Type 4: Smooth, soft sausage"
- tapOn:
    id: "sentiment-4"
- tapOn: "Save"
- waitForAnimationToEnd
- assertVisible: "TummyTracker"    # sync: modal fully dismissed, back on Home

# Navigate to Insights
- tapOn:
    id: "tab-insights"
- waitForAnimationToEnd
# Scroll to ensure the summary section is on-screen before asserting
- scrollUntilVisible:
    element:
      text: "Your journal so far"
    direction: DOWN
- assertVisible: "Your journal so far"
# The summary DATA line sits one row *below* the "Your journal so far" header, so
# the header-targeted scroll above can stop with the data line just below the fold
# (assertVisible does not scroll). Scroll until a token from the data line itself is
# on-screen before asserting its contents. (TEST_STRATEGY §7 — scroll before assert.)
- scrollUntilVisible:
    element:
      text: "rated"
    direction: DOWN
# Summary line: "<n> entries · <n> food · <n> BM · <n> rated · avg sentiment <x>"
- assertVisible: "BM"
# "food" appears in the same summary line as well
- assertVisible: "food"
