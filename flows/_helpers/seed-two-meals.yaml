appId: com.tummytracker.app
# Helper — adds "Oatmeal" (very satisfied) and "Pizza slice" (very unhappy).
# Assumes the app is already running and the Home screen is visible.
# Invoke via: runFlow: _helpers/seed-two-meals.yaml
---
- tapOn:
    text: "Add an entry manually"
- tapOn:
    text: "Entry name"
- inputText: "Oatmeal"
- hideKeyboard
- tapOn:
    text: "Breakfast"
- tapOn:
    id: "sentiment-5"
- scrollUntilVisible:
    element:
      text: "Save entry"
    direction: DOWN
- tapOn:
    text: "Save entry"
- waitForAnimationToEnd

- tapOn:
    text: "Add an entry manually"
- tapOn:
    text: "Entry name"
- inputText: "Pizza slice"
- hideKeyboard
- tapOn:
    text: "Lunch"
- tapOn:
    id: "sentiment-1"
- scrollUntilVisible:
    element:
      text: "Save entry"
    direction: DOWN
- tapOn:
    text: "Save entry"
- waitForAnimationToEnd
