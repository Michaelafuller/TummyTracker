appId: com.tummytracker.app
# Helper — seeds 5 "Wheat Bread" meals (low sentiment) + 2 "Rice Bowl" meals
# (high sentiment) to trigger analyzeFoodSentiment.
# Ingredients omitted to avoid scroll — food name alone is enough for food
# sentiment analysis. Assumes app is running and Home screen is visible.
---
- tapOn:
    text: "Add an entry manually"
- tapOn:
    text: "Entry name"
- inputText: "Wheat Bread"
- hideKeyboard
- tapOn:
    id: "sentiment-1"
- scrollUntilVisible:
    element:
      text: "Save entry"
    direction: DOWN
- tapOn:
    text: "Save entry"
- waitForAnimationToEnd

