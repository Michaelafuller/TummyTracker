- scrollUntilVisible:
    element:
      text: "Ingredients (optional)"
    direction: DOWN
- tapOn: "Ingredients"
- inputText: "onion, garlic"
- hideKeyboard
- scrollUntilVisible:
    element:
      text: "Save entry"
    direction: DOWN
- tapOn: "Save entry"
- waitForAnimationToEnd

