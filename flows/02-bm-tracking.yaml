appId: com.tummytracker.app
# Phase 2 — Bowel-movement tracking:
#   - Log a BM with Bristol type and sentiment
#   - Renders distinctly (💩 prefix, "Bowel movement" subtitle) in Journal
#   - BM filter shows only BMs; Food filter excludes BMs
#   - Pre-existing food entries still load after migration (seeded here)
---
- launchApp:
    clearState: true

# Seed food entries to verify they coexist with BMs
- runFlow: _helpers/seed-two-meals.yaml

# --- Log a bowel movement ---
- tapOn:
    text: "Log a bowel movement"
- waitForAnimationToEnd

# Bristol type 4 = "Smooth, soft sausage"
- tapOn:
    text: "Type 4: Smooth, soft sausage"

# Sentiment
- tapOn:
    id: "sentiment-4"

# Save
- tapOn: "Save"
- waitForAnimationToEnd
- assertVisible: "TummyTracker"

# --- Journal: BM renders distinctly (3 total: 2 food + 1 BM) ---
- tapOn:
    id: "tab-journal"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible: "3 entries"

# --- Filter: BM only ---
- tapOn: "BM"
- waitForAnimationToEnd
- assertVisible: "1 entry"
- assertNotVisible: "Oatmeal"
- assertNotVisible: "Pizza slice"

# --- Filter: Food only ---
- tapOn: "Food"
- waitForAnimationToEnd
- assertVisible: "2 entries"
- assertVisible: "Oatmeal"
- assertVisible: "Pizza slice"

# --- All filter: all 3 present ---
- tapOn: "All"
- waitForAnimationToEnd
- assertVisible: "3 entries"
- assertVisible: "Oatmeal"
