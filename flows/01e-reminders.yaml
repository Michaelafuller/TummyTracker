appId: com.tummytracker.app
# Phase 1e — Reminders: toggle the breakfast reminder on; OS notification
# permission prompt should appear (or be silently granted if already given).
# Verifies the settings screen is functional and doesn't crash on toggle.
# SKIP: cannot verify a notification fires at the scheduled time — that needs
# real time to elapse on a physical device.
---
- launchApp:
    clearState: true
    permissions:
      notifications: allow

- tapOn:
    id: "tab-settings"
- waitForAnimationToEnd

# Reminder settings screen should be visible
- assertVisible: "Export data"
- assertVisible:
    text: "breakfast reminder"

# Toggle breakfast on — triggers enableReminder which requests permission
- tapOn:
    text: "breakfast reminder"
- waitForAnimationToEnd

# Screen should still be visible (no crash, no unexpected navigation)
- assertVisible:
    text: "breakfast reminder"

# Verify time field opens the native picker (now a chip showing 12h time,
# e.g. "8:00 AM" — HANDOFF 1.2/1.3, replaces the old raw HH:MM text input)
- tapOn:
    text: "breakfast reminder time"
- waitForAnimationToEnd
- tapOn: "OK"
- waitForAnimationToEnd
- assertVisible:
    text: "breakfast reminder time"
