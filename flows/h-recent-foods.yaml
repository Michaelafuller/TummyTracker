appId: com.tummytracker.app
# Tier-0 H — Recent foods searchable quick-add (HANDOFF 1.4).
#   - After logging meals, the "Recent" section appears on the Home screen
#   - Typing in the search field filters the suggestion rows
#   - Tapping a row (id: recent-<slug>) opens the new-entry form pre-filled
#     with that food's data
#   - The date/time defaults to now (not the original log time)
#   - Saving creates a new distinct entry
#   - At most 6 rows shown at a time (no duplicate names)
---
- launchApp:
    clearState: true

# Seed two meals
- runFlow: _helpers/seed-two-meals.yaml

# Trigger useFocusEffect on Home (navigate away and back)
- tapOn:
    id: "tab-journal"
- tapOn:
    id: "tab-home"
- waitForAnimationToEnd

# "Recent" section heading and rows should now be visible
- assertVisible: "Recent"
- assertVisible: "Oatmeal"
- assertVisible: "Pizza slice"

# Search narrows the list to the matching row
- tapOn:
    text: "Search past foods…"
- inputText: "Oatmeal"
- assertVisible:
    id: "recent-oatmeal"

# Tap the Oatmeal row — opens prefilled new-entry form
- tapOn:
    id: "recent-oatmeal"
- waitForAnimationToEnd

# Form is open and pre-filled with the food's name (above fold confirms open)
- assertVisible: "Oatmeal"
- scrollUntilVisible:
    element:
      text: "Save entry"
    direction: DOWN
- assertVisible: "Save entry"

# Save the re-logged entry
- tapOn:
    text: "Save entry"
- waitForAnimationToEnd

# Journal now has two "Oatmeal" entries (original + the re-log)
- tapOn:
    id: "tab-journal"
- scrollUntilVisible:
    element:
      text: "Oatmeal"
    direction: DOWN
- assertVisible: "Oatmeal"
