appId: com.tummytracker.app
# Phase 1b — Manual entry, now routed through the meal-builder chain (HANDOFF
# "OFF search-by-name lookup" cycle, 2026-07-03): Home's "Add an entry
# manually" opens the component-confirm screen (ComponentForm), then "Finish
# meal" lands on the meal review screen for the meal-level fields (name, slot,
# sentiment, notes, 500-char limit). Verifies the full two-screen flow persists
# across an app restart (SQLite round-trip).
---
- launchApp:
    clearState: true

- tapOn:
    text: "Add an entry manually"
- assertVisible:
    text: "Component name"

# Component-confirm screen: name, ingredients, serving size, a couple nutrition fields
- tapOn:
    text: "Component name"
- inputText: "Chicken salad"
- hideKeyboard

- tapOn:
    text: "Ingredients"
- inputText: "chicken, lettuce, tomato, olive oil"
- hideKeyboard

- scrollUntilVisible:
    element:
      text: "Serving size in grams"
    direction: DOWN
- tapOn:
    text: "Serving size in grams"
- inputText: "250"

- scrollUntilVisible:
    element:
      text: "Calories"
    direction: DOWN
- tapOn:
    text: "Calories"
- inputText: "320"

- scrollUntilVisible:
    element:
      text: "Protein (g)"
    direction: DOWN
- tapOn:
    text: "Protein (g)"
- inputText: "28"
- hideKeyboard

- scrollUntilVisible:
    element:
      text: "Finish meal"
    direction: DOWN
- tapOn:
    text: "Finish meal"
- waitForAnimationToEnd

# Meal review screen: name arrives prefilled from the single component
- assertVisible: "Chicken salad"

- tapOn:
    text: "Lunch"

- tapOn:
    id: "sentiment-4"

# Notes — 510 chars; maxLength=500 caps to 500/500
- scrollUntilVisible:
    element:
      text: "Notes"
    direction: DOWN
- tapOn:
    text: "Notes"
- inputText: ""
- assertVisible: "500/500"
- hideKeyboard

# Save
- scrollUntilVisible:
    element:
      text: "Save meal"
    direction: DOWN
- tapOn:
    text: "Save meal"
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn:
    id: "tab-home"

# Verify in Journal
- tapOn:
    id: "tab-journal"
- waitForAnimationToEnd
- assertVisible: "Chicken salad"

# SQLite persistence: stop and relaunch without clearing state
- stopApp
- launchApp
- tapOn:
    id: "tab-journal"
- assertVisible: "Chicken salad"
